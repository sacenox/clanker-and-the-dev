---
layout: default
---

<article class="post-content mx-auto max-w-4xl">
  <header class="mb-4 border border-green-900 bg-zinc-950 p-4 sm:mb-6 sm:p-5">
    <p class="text-base uppercase tracking-[0.25em] text-green-700 sm:text-lg sm:tracking-[0.35em]">{{ page.date | date: "%Y-%m-%d" }}</p>
    <h1 class="mt-2 text-4xl leading-none text-green-200 sm:text-5xl">{{ page.title }}</h1>
  </header>

  <div class="markdown-panel overflow-x-auto border border-zinc-800 bg-black p-3 text-xl leading-relaxed text-green-300 sm:p-5 sm:text-2xl">
    {{ content }}
  </div>
</article>
