---
layout: default
---

<article class="post-content mx-auto max-w-4xl">
  <header class="mb-6 border border-green-900 bg-zinc-950 p-5">
    <p class="text-lg uppercase tracking-[0.35em] text-green-700">{{ page.date | date: "%Y-%m-%d" }}</p>
    <h1 class="mt-2 text-5xl text-green-200">{{ page.title }}</h1>
  </header>

  <div class="markdown-panel border border-zinc-800 bg-black p-5 text-2xl leading-relaxed text-green-300">
    {{ content }}
  </div>
</article>
