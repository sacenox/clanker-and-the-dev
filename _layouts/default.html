<!doctype html>
<html lang="en">
  {% include head.html %}
  <body class="scanlines min-h-screen bg-black text-green-400 selection:bg-green-900 selection:text-green-100">
    <div class="min-h-screen border-green-950 md:grid md:grid-cols-[19rem_minmax(0,1fr)]">
      <aside class="flex flex-col border-b border-green-950 bg-zinc-950/90 p-4 md:min-h-screen md:border-b-0 md:p-5">
        <a
          href="{{ '/' | relative_url }}"
          class="flex items-center gap-3 border border-green-800 bg-black p-3 text-2xl uppercase tracking-widest text-green-300 shadow-[0_0_20px_rgba(34,197,94,0.12)] sm:p-4 sm:text-3xl"
        >
          <img
            src="{{ '/assets/favicon.svg' | relative_url }}"
            alt=""
            aria-hidden="true"
            class="h-12 w-12 shrink-0 sm:h-14 sm:w-14"
          />
          <span>Clanker<br />&amp; the Dev</span>
        </a>
        <p class="mt-3 text-base text-green-700 sm:text-lg">terminal comics from the build log</p>

        <nav class="mt-6 grow md:mt-8">
          <h2 class="border-b border-green-900 pb-2 text-xl uppercase text-green-500">Post history</h2>
          <ol class="mt-3 flex gap-3 overflow-x-auto pb-2 md:block md:space-y-2 md:overflow-visible md:pb-0">
            {% for post in site.posts %}
              <li class="min-w-56 md:min-w-0">
                <a
                  href="{{ post.url | relative_url }}"
                  class="block h-full border border-zinc-800 bg-zinc-950 p-3 text-lg text-green-300 hover:border-green-700 hover:bg-green-950/30 sm:text-xl"
                >
                  <span class="block text-sm text-green-700">{{ post.date | date: "%Y-%m-%d" }}</span>
                  {{ post.title }}
                </a>
              </li>
            {% endfor %}
          </ol>
        </nav>

        <footer class="mt-6 border border-green-900 bg-black/70 p-3 text-base text-green-600 md:mt-8 md:p-4 sm:text-lg">
          <p class="uppercase tracking-widest text-green-400">Got a joke?</p>
          <p class="mt-2">Fork the repo, add your Clanker bit, and open a PR.</p>
          <a
            href="{{ site.github_repo }}"
            class="mt-3 block border border-zinc-800 bg-zinc-950 p-3 text-center uppercase tracking-widest text-green-300 hover:border-green-700 hover:bg-green-950/30"
            target="_blank"
            rel="noopener noreferrer"
          >
            GitHub repo
          </a>
        </footer>
      </aside>

      <main id="main" class="min-w-0 border-green-950 p-4 md:min-h-screen md:border-l md:p-6 lg:p-10">
        {{ content }}
      </main>
    </div>
  </body>
</html>
