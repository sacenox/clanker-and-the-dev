title: Clanker and the Dev
description: terminal comics from the build log
github_repo: "https://github.com/sacenox/clanker-and-the-dev"
url: "https://sacenox.github.io"
baseurl: "/clanker-and-the-dev"
markdown: kramdown
permalink: /posts/:title/
timezone: UTC
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
exclude:
  - AGENTS.md
  - Dockerfile
  - Gemfile
  - Gemfile.lock
  - README.md
  - dev.sh
  - comic/
  - .agents/
  - .cache/
  - .bundle/
  - .jekyll-cache/
  - .sass-cache/
  - _site/
  - vendor/
  - node_modules/
sass:
  sass_dir: assets/css
  style: compressed
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
